<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Shopping cart</title>
</head>

<body>
    <div>
        <!-- ส่วน header -->
        <div class="flex justify-around min-w-screen p-2 shadow-sm">
            <div class="flex gap-1 items-center text-xl">
                <i class="fa-solid fa-bag-shopping text-[#2ecc71]"></i>
                <h3 class="font-bold text-[#2ecc71]">Job</h3>
                <h3>Passcard</h3>
            </div>
            <ul class="flex gap-4 font-bold">
                <li>ABOUT US</li>
                <li>PASSCARD</li>
                <li>PROFILE</li>
            </ul>
            <div class="flex gap-4 font-bold">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
                <div class="flex relative">
                    <button><i class="fa-solid fa-cart-shopping"></i></button>
                    <div
                        class=" bg-red-600 text-white text-[10px] font-light -top-0.5 left-3 w-3 h-3 flex items-center justify-center rounded-full absolute">
                        9</div>
                </div>
                <button>LOGIN</button>
                <button class="text-[#2ecc71]">SIGN IN</button>
            </div>
        </div>
        <!-- ส่วน Main -->
        <h1 class="text-[45px] font-bold pl-33 pt-20 pr-30 pb-5">My Cart</h1>
        <div class="flex flex-col items-center">
            <div class="flex justify-around gap-5">
                <!-- กล่องซ้าย -->
                <div class="flex flex-col gap-5">
                    <!-- กล่อง google docs -->
                    <div class="flex items-center gap-5 bg-slate-50 shadow-xl border-1 border-gray-100 rounded-4xl w-170 p-5">
                        <button class="w-9 h-9 bg-white rounded-full text-[#2ecc71] border-2 border-[#2ecc71]"><i
                                class="fa-regular fa-trash-can"></i></button>
                        <div class="flex flex-col justify-center items-start bg-gradient-to-b from-sky-600 via-sky-500 to-sky-300 w-40 h-40 p-3 rounded-3xl">
                            <div class="bg-white/70 w-8 h-8 flex items-center justify-center rounded-md"><i
                                    class="fa-regular fa-file-lines text-sky-600"></i></div>
                            <span class="font-bold pt-2 text-white">Google Docs</span>
                            <span class="text-[10px] pt-2 text-white">Used for business</span>
                        </div>
                        <div class=" flex flex-col gap-2">
                            <h3 class="font-bold text-xl">Google Docs</h3>
                            <div class="flex justify-center items-center gap-2">
                                <div class=" bg-[#2ecc71] w-3 h-3 rounded-full"></div>
                                <div class=" bg-[#cccccc] w-3 h-3 rounded-full"></div>
                                <div class=" bg-[#cccccc] w-3 h-3 rounded-full"></div>
                                <select name="cars" id="cars" class="w-20 h-6 bg-whiterounded-md text-center">
                                    <option value="LV1">LV 1-3</option>
                                    <option value="LV2">LV 2-3</option>
                                    <option value="LV3">LV 3-3</option>
                                </select>
                            </div>
                            <h3 class="pt-4">THB 150</h3>
                        </div>
                    </div>
                    <!-- กล่อง google slides -->
                    <div class="flex items-center gap-5 bg-slate-50 shadow-xl border-1 border-gray-100 rounded-4xl w-170 p-5">
                        <button class="w-9 h-9 bg-white rounded-full text-[#2ecc71] border-2 border-[#2ecc71]"><i
                                class="fa-regular fa-trash-can"></i></button>
                        <div class="flex flex-col justify-center items-start bg-gradient-to-b from-orange-600 via-orange-500 to-orange-300 w-40 h-40 p-3 rounded-3xl">
                            <div class="bg-white/70 w-8 h-8 flex items-center justify-center rounded-md"><i
                                    class="fa-regular fa-file-lines text-orange-600"></i></div>
                            <span class="font-bold pt-2 text-white">Google Slides</span>
                            <span class="text-[10px] pt-2 text-white">Used for business</span>
                        </div>
                        <div class=" flex flex-col gap-2">
                            <h3 class="font-bold text-xl">Google Slides</h3>
                            <div class="flex justify-center items-center gap-2">
                                <div class=" bg-[#2ecc71] w-3 h-3 rounded-full"></div>
                                <div class=" bg-[#2ecc71] w-3 h-3 rounded-full"></div>
                                <div class=" bg-[#2ecc71] w-3 h-3 rounded-full"></div>
                                <div class=" bg-[#cccccc] w-3 h-3 rounded-full"></div>
                                <select name="cars" id="cars" class="w-20 h-6 bg-whiterounded-md text-center">
                                    <option value="LV1">LV 1/4</option>
                                    <option value="LV1">LV 2/4</option>
                                    <option value="LV1">LV 3/4</option>
                                </select>
                            </div>
                            <h3 class="pt-4">THB 150</h3>
                        </div>
                    </div>

                </div>
                <!-- กล่องขวา -->
                <div class="bg-slate-50 shadow-xl border-1 border-gray-100 rounded-4xl w-130 p-7">
                    <h3 class="font-bold text-2xl pb-5">Order Info</h3>
                    <div class="flex justify-between pb-5 text-gray-500">
                        <span>Subtotal</span>
                        <span>THB 300</span>
                    </div>
                    <div class="flex justify-between items-center pb-10 border-b-1 border-b-gray-200">
                        <div class="text-[#2ecc71] text-[20px]"><i class="fa-regular fa-credit-card"></i></div>
                        <input type="promotion" placeholder="Promotion Code" class="border-1 border-gray-200 w-90 h-9 p-2 rounded text-[12px]">
                        <button class="border-2 w-30 h-9 rounded-xl text-[12px] font-bold text-[#2ecc71]">APPLY</button>
                    </div>
                    <div class="flex pt-7 justify-between items-center">
                        <span>Total Payment</span>
                        <span class="text-3xl font-medium text-[#2ecc71]">THB 300</span>
                    </div>
                    <div class="pt-5 flex justify-center">
                        <button class="text-center p-1 h-9 font-bold text-[12px] w-full rounded-xl bg-[#2ecc71]">LOG IN TO CHECKOUT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
